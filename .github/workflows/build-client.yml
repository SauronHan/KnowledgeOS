name: Build KnowledgeOS Client

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
  pull_request:
    paths:
      - 'client/**'
  workflow_dispatch:

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
            description: "macOS Universal"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            description: "Windows 64-bit"

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Frontend Dependencies
        working-directory: client
        run: npm install

      # Tauri 打包神器，会自动构建并将产物上传为 Github Release Draft
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: client
          tagName: v__VERSION__
          releaseName: 'KnowledgeOS Client v__VERSION__'
          releaseBody: '自动化构建发布的商业化安装包 (包含 macOS DMG 和 Windows EXE)。'
          releaseDraft: true
          prerelease: false
