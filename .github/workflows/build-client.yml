name: Build KnowledgeOS Client

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
  pull_request:
    paths:
      - 'client/**'
  workflow_dispatch:

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
            description: "macOS Universal"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            description: "Windows 64-bit"

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 升级到 Node 22 避免警告

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Frontend Dependencies
        working-directory: client
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 强制跳过签名检查（除非你配置了证书）
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          projectPath: client
          tagName: v__VERSION__
          releaseName: 'KnowledgeOS Client v__VERSION__'
          releaseBody: 'Automated build (macOS DMG & Windows EXE).'
          releaseDraft: true
          prerelease: false
